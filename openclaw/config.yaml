# =============================================================================
# RentInLondon PRO — OpenClaw Gateway Configuration
# 8 agentes en el mismo gateway
# Nota: Los modelos de IA se configuran en las variables de entorno
# =============================================================================

gateway:
  name: rentinlondon-pro
  port: ${GATEWAY_PORT:-3000}
  host: ${GATEWAY_HOST:-0.0.0.0}
  timezone: Europe/London
  log_level: ${LOG_LEVEL:-info}
  log_file: ${LOG_DIR:-/var/log/rentinlondon}/${LOG_FILE:-agent.log}

# ─── Configuración de base de datos ───────────────────────────────────────────
database:
  provider: supabase
  url: ${SUPABASE_URL}
  anon_key: ${SUPABASE_ANON_KEY}
  service_role_key: ${SUPABASE_SERVICE_ROLE_KEY}

# ─── Canales de comunicación compartidos ──────────────────────────────────────
channels:
  whatsapp:
    provider: wacli
    # wacli gestiona la sesión QR internamente en OpenClaw
    # No requiere api_url, token ni phone_id de Meta
  telegram:
    provider: telegram
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    webhook_path: /webhooks/telegram
  webhook:
    hmac_secret: ${HMAC_SECRET}
    header: X-Signature
    algorithm: sha256
    path: /webhooks/internal

# =============================================================================
# AGENTES PRINCIPALES
# =============================================================================

agents:

  # ─── ALEX: Coordinador / Administrador ──────────────────────────────────────
  - id: alex
    name: Alex
    role: coordinator
    soul: workspace/agents/alex/SOUL.md
    identity: workspace/agents/alex/IDENTITY.md
    channel: telegram
    active: true
    # ─── NVIDIA NIM — Llama 3.1 Nemotron 70B ─────────────────────────────────
    # ⚠️ CUOTA LIMITADA: 1000 solicitudes TOTALES.
    # ⚠️ ADVERTENCIA automática cada 250 solicitudes (25% del total).
    # ⚠️ Al llegar a 750 solicitudes, el sistema DEBE alertar por Telegram.
    # ⚠️ Al llegar a 950 solicitudes, DETENER y escalar a humano.
    llm:
      provider: nvidia
      model: qwen/qwen3-coder-480b-a35b-instruct
      base_url: https://integrate.api.nvidia.com/v1
      api_key: ${NVIDIA_API_KEY}
      fallbacks:
        - model: deepseek-ai/deepseek-v3_1
          api_key: ${NVIDIA_API_KEY}
        - model: google/gemini-2.5-flash
          api_key: ${GEMINI_API_KEY_ALEX}
      temperature: 0.1
      max_tokens: 8192
      top_p: 0.7
      context_window: 262144
      stream: false
    tools:
      - supabase_read_all
      - supabase_write_logs
      - supabase_write_summaries
      - supabase_leads_uk_rw
      - supabase_leads_ads_uk_rw
      - supabase_leads_marketplace_uk_rw
      - supabase_leads_intl_rw
      - supabase_contracts_rw
      - supabase_properties_rw
      - supabase_listings_history_rw
      - supabase_read_views
      - supabase_leads_update_status
      - whatsapp_send
      - whatsapp_receive
      - read_whatsapp_history
      - write_memory_file
      - facebook_ads_api_read
      - gumtree_api
      - refresh_listing
      - normalize_data
      - refresh_scoring
      - telegram_send
      - generate_report
      - read_snapshot
      - compliance_audit_read
      - read_workspace_memory    # Lee shared/memory.md — memoria central
      - write_workspace_memory   # Escribe en shared/memory.md — solo Alex
    heartbeat:
      interval: 60m
    schedule:
      daily_report: "0 8 * * 1-5 Europe/London"
      weekly_report: "0 9 * * 1 Europe/London"
    rate_limits:
      total_requests: 1000        # Límite absoluto de la API NVIDIA
      requests_per_hour: 10       # Conservador: máx 10 req/h para estirar cuota
      tokens_per_day: 20000
      warning_thresholds:         # ⚠️ Alertas automáticas por Telegram
        - at: 250                 # 25% consumido
          action: warn_telegram
          message: "⚠️ Alex ha usado 250/1000 solicitudes NVIDIA (25%)"
        - at: 500                 # 50% consumido
          action: warn_telegram
          message: "⚠️ Alex ha usado 500/1000 solicitudes NVIDIA (50%)"
        - at: 750                 # 75% consumido — alerta crítica
          action: warn_telegram
          message: "🔴 Alex ha usado 750/1000 solicitudes NVIDIA (75%) — REVISAR USO"
        - at: 950                 # 95% consumido — detener
          action: stop_and_escalate
          message: "🛑 Alex ha usado 950/1000 solicitudes NVIDIA — DETENIDO. Escalar a humano."
    db_role: alex_role

  # ─── IVY: WhatsApp UK Intake y Nurturing ─────────────────────────────────────
  - id: ivy
    name: Ivy
    role: intake_uk
    soul: workspace/agents/ivy/SOUL.md
    identity: workspace/agents/ivy/IDENTITY.md
    channel: whatsapp
    active: true
    llm:
      model: ${LLM_MODEL_IVY:-google/gemini-2.5-flash-lite}
      api_key: ${GEMINI_API_KEY_IVY}
      fallback_api_key: ${GEMINI_FALLBACK_API_KEY_IVY}
      temperature: 0.4
      max_tokens: 2048
    tools:
      - whatsapp_send
      - whatsapp_receive
      - supabase_leads_uk_rw
      - supabase_interactions_rw
      - supabase_write_logs
      - schedule_viewing
      - escalate_to_jeanette
      - read_whatsapp_history   # Lee agents/ivy/memory/whatsapp_history.json
      - write_memory_file       # Escribe en agents/ivy/memory/
      - report_to_alex          # Envía resumen de leads y citas a Alex vía internal
      - read_workspace_memory   # Lee shared/memory.md — memoria central (solo lectura)
    heartbeat:
      interval: 60m
    triggers:
      - event: whatsapp.message.received
        filter: "lead.canal_origen = 'whatsapp' AND lead.es_internacional = false"
    rate_limits:
      tokens_per_day: 30000
      requests_per_hour: 200
    db_role: ivy_role
    restrictions:
      - no_discriminatory_screening
      - equality_act_2010_compliant

  # ─── ROSE: WhatsApp UK Leads de Ads ──────────────────────────────────────────
  - id: rose
    name: Rose
    role: ads_followup_uk
    soul: workspace/agents/rose/SOUL.md
    identity: workspace/agents/rose/IDENTITY.md
    channel: whatsapp
    active: true
    llm:
      model: ${LLM_MODEL_ROSE:-google/gemini-2.5-flash-lite}
      api_key: ${GEMINI_API_KEY_ROSE}
      fallback_api_key: ${GEMINI_FALLBACK_API_KEY_ROSE}
      temperature: 0.4
      max_tokens: 2048
    tools:
      - whatsapp_send
      - whatsapp_receive
      - supabase_leads_ads_uk_rw
      - supabase_interactions_rw
      - supabase_write_logs
      - schedule_viewing
      - escalate_to_jeanette
      - read_whatsapp_history   # Lee agents/rose/memory/whatsapp_history.json
      - write_memory_file       # Escribe en agents/rose/memory/
      - report_to_alex          # Envía resumen de leads y citas a Alex vía internal
      - read_workspace_memory   # Lee shared/memory.md — memoria central (solo lectura)
    heartbeat:
      interval: 60m
    triggers:
      - event: lead.created
        filter: "canal_origen IN ('facebook','instagram') AND es_internacional = false"
    rate_limits:
      tokens_per_day: 25000
      requests_per_hour: 150
    db_role: rose_role
    restrictions:
      - no_discriminatory_screening
      - equality_act_2010_compliant

  # ─── SALO: WhatsApp UK Marketplaces ──────────────────────────────────────────
  - id: salo
    name: Salo
    role: marketplace_intake_uk
    soul: workspace/agents/salo/SOUL.md
    identity: workspace/agents/salo/IDENTITY.md
    channel: whatsapp
    active: true
    llm:
      model: ${LLM_MODEL_SALO:-google/gemini-2.5-flash-lite}
      api_key: ${GEMINI_API_KEY_SALO}
      fallback_api_key: ${GEMINI_FALLBACK_API_KEY_SALO}
      temperature: 0.3
      max_tokens: 1024
    tools:
      - whatsapp_send
      - whatsapp_receive
      - supabase_leads_marketplace_uk_rw
      - supabase_interactions_rw
      - supabase_write_logs
      - quick_qualify
      - escalate_to_jeanette
      - read_whatsapp_history   # Lee agents/salo/memory/whatsapp_history.json
      - write_memory_file       # Escribe en agents/salo/memory/
      - report_to_alex          # Envía resumen de leads y citas a Alex vía internal
      - read_workspace_memory   # Lee shared/memory.md — memoria central (solo lectura)
    heartbeat:
      interval: 60m
    triggers:
      - event: lead.created
        filter: "canal_origen IN ('gumtree','rightmove','zoopla','spareroom','openrent') AND es_internacional = false"
    rate_limits:
      tokens_per_day: 20000
      requests_per_hour: 200
    db_role: salo_role
    restrictions:
      - no_discriminatory_screening
      - equality_act_2010_compliant
      - fast_intake_only

  # ─── JEANETTE: WhatsApp UK + Internacional ────────────────────────────────────
  - id: jeanette
    name: Jeanette
    role: closing_uk_intl
    soul: workspace/agents/jeanette/SOUL.md
    identity: workspace/agents/jeanette/IDENTITY.md
    channel: whatsapp
    active: true
    llm:
      model: ${LLM_MODEL_JEANETTE:-google/gemini-2.5-flash-lite}
      api_key: ${GEMINI_API_KEY_JEANETTE}
      fallback_api_key: ${GEMINI_FALLBACK_API_KEY_JEANETTE}
      temperature: 0.3
      max_tokens: 4096
    tools:
      - whatsapp_send
      - whatsapp_receive
      - supabase_leads_intl_rw
      - supabase_contracts_rw
      - supabase_interactions_rw
      - supabase_write_logs
      - schedule_video_tour
      - send_contract
      - request_r2r_documents
      - escalate_to_human
      - read_whatsapp_history   # Lee agents/jeanette/memory/whatsapp_history.json
      - write_memory_file       # Escribe en agents/jeanette/memory/
      - report_to_alex          # Envía resumen de leads, citas y contratos a Alex vía internal
      - read_workspace_memory   # Lee shared/memory.md — memoria central (solo lectura)
    heartbeat:
      interval: 60m
    triggers:
      - event: lead.escalated
        filter: "escalado_jeanette = true"
      - event: lead.created
        filter: "es_internacional = true"
    rate_limits:
      tokens_per_day: 40000
      requests_per_hour: 150
    db_role: jeanette_role
    restrictions:
      - no_discriminatory_screening
      - equality_act_2010_compliant
      - requires_r2r_verification

# =============================================================================
# SUB-AGENTES (bajo consumo de tokens)
# =============================================================================

  # ─── ADS-FB: Gestión de Campañas Facebook/Instagram ──────────────────────────
  # NOTA: ads-fb NO captura leads. Los leads llegan directamente a las agentes
  # (Rose/Ivy) vía Click-to-WhatsApp (CTWA) en los anuncios.
  # ads-fb gestiona campañas, mide rendimiento y reporta métricas.
  - id: facebook
    name: Facebook-Ads
    role: facebook_ads_campaign_manager
    soul: workspace/agents/facebook/SOUL.md
    identity: workspace/agents/facebook/IDENTITY.md
    channel: internal
    active: true
    llm:
      model: ${LLM_MODEL_ADSFB:-google/gemini-2.5-flash-lite}
      api_key: ${GEMINI_API_KEY_SUBAGENTS}
      fallback_api_key: ${GEMINI_FALLBACK_API_KEY_SUBAGENTS}
      temperature: 0.2
      max_tokens: 1024
    tools:
      - facebook_ads_api_read
      - supabase_read_views
      - supabase_write_logs
      - generate_ads_report
    schedule:
      ads_report: "0 18 * * * Europe/London"
    rate_limits:
      tokens_per_day: 10000
      requests_per_hour: 100
    db_role: ads_fb_role
    restrictions:
      - no_contract_access
      - no_lead_capture
      - campaign_reporting_only

  # ─── ADS-GUMTREE: Gestión de Listings en Marketplaces ────────────────────────
  # NOTA: ads-gumtree NO captura leads. Los leads llegan directamente a Salo
  # cuando el prospecto contacta por WhatsApp desde el anuncio del marketplace.
  # ads-gumtree gestiona listings: publicar, refrescar, pausar y reportar.
  - id: gumtree
    name: Gumtree-Ads
    role: marketplace_listings_manager
    soul: workspace/agents/gumtree/SOUL.md
    identity: workspace/agents/gumtree/IDENTITY.md
    channel: internal
    active: true
    llm:
      model: ${LLM_MODEL_GUMTREE:-google/gemini-2.5-flash-lite}
      api_key: ${GEMINI_API_KEY_SUBAGENTS}
      fallback_api_key: ${GEMINI_FALLBACK_API_KEY_SUBAGENTS}
      temperature: 0.2
      max_tokens: 1024
    tools:
      - gumtree_api
      - rightmove_api_read
      - zoopla_api_read
      - supabase_listings_history_rw
      - supabase_read_views
      - supabase_write_logs
      - refresh_listing
    schedule:
      listings_refresh: "0 11 * * 1,4 Europe/London"
      performance_report: "0 17 * * * Europe/London"
    rate_limits:
      tokens_per_day: 8000
      requests_per_hour: 80
    db_role: ads_gumtree_role
    restrictions:
      - no_contract_access
      - no_lead_capture
      - listings_management_only

  # ─── SCRIPT-RUNNER: Tareas Internas ──────────────────────────────────────────
  - id: script
    name: Script-Runner
    role: internal_automation
    soul: workspace/agents/script/SOUL.md
    identity: workspace/agents/script/IDENTITY.md
    channel: internal
    active: true
    llm:
      model: ${LLM_MODEL_SCRIPTS:-google/gemini-2.5-flash-lite}
      api_key: ${GEMINI_API_KEY_SUBAGENTS}
      fallback_api_key: ${GEMINI_FALLBACK_API_KEY_SUBAGENTS}
      temperature: 0.1
      max_tokens: 2048
    tools:
      - supabase_read_views
      - supabase_leads_update_status
      - supabase_write_logs
      - normalize_data
      - prepare_reactivation_messages
      - validate_data_completeness
      - refresh_scoring
    schedule:
      reactivator: "0 7 * * * Europe/London"
      data_normalization: "0 3 * * * Europe/London"
      score_refresh: "0 6 * * * Europe/London"
    rate_limits:
      tokens_per_day: 15000
      requests_per_hour: 50
    db_role: script_runner_role
    restrictions:
      - no_external_channel_access
      - no_contract_access
      - no_send_without_approval
      - reactivation_requires_human_approval

# =============================================================================
# CONFIGURACIÓN GLOBAL
# =============================================================================
global:
  compliance:
    framework: UK_Equality_Act_2010
    excluded_attributes:
      - age
      - disability
      - gender_reassignment
      - marriage_civil_partnership
      - pregnancy_maternity
      - race
      - religion_belief
      - sex
      - sexual_orientation
    audit_all_decisions: true
    audit_table: compliance_audit

  security:
    hmac_algorithm: sha256
    hmac_header: X-Signature
    jwt_expiry: 3600
    env_file_permissions: "600"

  monitoring:
    daily_token_limit: ${DAILY_TOKEN_LIMIT:-100000}
    daily_cost_limit_gbp: ${DAILY_COST_LIMIT_GBP:-50}
    alert_channel: telegram
    alert_recipient: ${TELEGRAM_CHAT_ID}